<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Slack Broadcaster</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; }
    .app { width: 100%; max-width: 680px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .header-icon { width: 40px; height: 40px; background: #4A154B; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
    .header p { font-size: 13px; color: #888; margin-top: 2px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.07); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #999; margin-bottom: 12px; }
    .token-wrap { position: relative; }
    .token-wrap input { width: 100%; padding: 10px 40px 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 13px; font-family: monospace; color: #333; transition: border 0.2s; }
    .token-wrap input:focus { outline: none; border-color: #4A154B; }
    .token-wrap input.saved { border-color: #27ae60; background: #f0fff4; }
    .token-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; font-size: 16px; }
    .token-status { font-size: 11px; margin-top: 6px; color: #888; }
    .token-status.ok { color: #27ae60; }
    .token-status.err { color: #e74c3c; }
    .channel-list { display: flex; flex-direction: column; gap: 8px; }
    .channel-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid #e8e8e8; border-radius: 8px; cursor: pointer; transition: border 0.15s, background 0.15s; user-select: none; }
    .channel-row:hover { border-color: #4A154B20; background: #faf8fb; }
    .channel-row.selected { border-color: #4A154B; background: #f8f0f9; }
    .channel-check { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; flex-shrink: 0; transition: background 0.15s, border 0.15s; }
    .channel-row.selected .channel-check { background: #4A154B; border-color: #4A154B; }
    .channel-name { font-size: 14px; font-weight: 500; color: #222; }
    .channel-actions { display: flex; gap: 8px; margin-top: 10px; }
    .channel-actions button { font-size: 12px; color: #4A154B; background: none; border: none; cursor: pointer; padding: 2px 0; text-decoration: underline; }
    .add-channel { display: flex; gap: 8px; margin-top: 10px; }
    .add-channel input { flex: 1; padding: 8px 12px; border: 1.5px dashed #ccc; border-radius: 8px; font-size: 13px; color: #333; }
    .add-channel input:focus { outline: none; border-color: #4A154B; border-style: solid; }
    .add-channel button { padding: 8px 14px; background: #f0e8f0; color: #4A154B; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    textarea { width: 100%; min-height: 120px; padding: 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; line-height: 1.5; resize: vertical; color: #222; transition: border 0.2s; }
    textarea:focus { outline: none; border-color: #4A154B; }
    .char-count { font-size: 11px; color: #aaa; text-align: right; margin-top: 4px; }
    .file-drop { border: 2px dashed #ddd; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: border 0.2s, background 0.2s; margin-top: 12px; }
    .file-drop:hover { border-color: #4A154B; background: #faf8fb; }
    .file-drop input { display: none; }
    .file-drop p { font-size: 13px; color: #aaa; }
    .file-drop p span { color: #4A154B; font-weight: 600; }
    .file-preview { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f8f0f9; border-radius: 8px; margin-top: 8px; }
    .file-icon { font-size: 20px; }
    .file-info { flex: 1; }
    .file-name { font-size: 13px; font-weight: 600; color: #333; }
    .file-size { font-size: 11px; color: #aaa; }
    .remove-file { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; }
    #sendBtn { width: 100%; padding: 13px; background: #4A154B; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
    #sendBtn:hover:not(:disabled) { background: #3a0f3b; }
    #sendBtn:disabled { background: #ccc; cursor: not-allowed; }
    .results { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .result-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; font-size: 13px; }
    .result-row.success { background: #eaf6ef; color: #1e7e34; }
    .result-row.error { background: #fdecea; color: #c0392b; }
    .result-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .result-row.success .result-dot { background: #27ae60; }
    .result-row.error .result-dot { background: #e74c3c; }

    /* Password overlay */
    #passOverlay { position: fixed; inset: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    #passBox { background: #fff; border-radius: 16px; padding: 36px 32px; width: 320px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    #passBox h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 4px; }
    #passBox p { font-size: 13px; color: #888; margin-bottom: 20px; }
    #passInput { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 8px; box-sizing: border-box; }
    #passInput:focus { outline: none; border-color: #4A154B; }
    #passErr { color: #e74c3c; font-size: 12px; min-height: 16px; margin-bottom: 8px; }
    #passBtn { width: 100%; padding: 11px; background: #4A154B; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
    #passBtn:hover { background: #3a0f3b; }
  </style>
</head>
<body>

<!-- Password Overlay -->
<div id="passOverlay">
  <div id="passBox">
    <div style="font-size:32px;margin-bottom:8px">💬</div>
    <h2>Slack Broadcaster</h2>
    <p>Enter password to continue</p>
    <input type="password" id="passInput" placeholder="Password">
    <div id="passErr"></div>
    <button id="passBtn">Enter</button>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="header-icon">💬</div>
    <div>
      <h1>Slack Broadcaster</h1>
      <p>Send a message to multiple channels at once</p>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Slack Bot Token</div>
    <div class="token-wrap">
      <input type="password" id="tokenInput" placeholder="xoxb-your-token-here" autocomplete="off">
      <button class="token-toggle" onclick="toggleToken()">👁</button>
    </div>
    <div class="token-status" id="tokenStatus">Paste your bot token above</div>
  </div>

  <div class="card">
    <div class="card-title">Channels</div>
    <div class="channel-list" id="channelList"></div>
    <div class="channel-actions">
      <button onclick="selectAll()">Select all</button>
      <button onclick="selectNone()">Deselect all</button>
    </div>
    <div class="add-channel">
      <input type="text" id="newChannel" placeholder="Add channel (e.g. cortex-rajib)" onkeydown="if(event.key==='Enter')addChannel()">
      <button onclick="addChannel()">+ Add</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Message</div>
    <textarea id="messageInput" placeholder="Write your message here..." oninput="updateCharCount()"></textarea>
    <div class="char-count"><span id="charCount">0</span> characters</div>
    <div class="file-drop" id="fileDrop" onclick="document.getElementById('fileInput').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleDrop(event)">
      <input type="file" id="fileInput" onchange="handleFile(this.files[0])">
      <p>📎 <span>Click to attach a file</span> or drag and drop</p>
    </div>
    <div id="filePreview" style="display:none"></div>
  </div>

  <button id="sendBtn" onclick="send()">Send to Selected Channels</button>
  <div class="results" id="results"></div>
</div>

<script>
  // ── PASSWORD ──────────────────────────────────────────────
  var PASS = "aharon1!";
  var overlay = document.getElementById("passOverlay");
  var passInput = document.getElementById("passInput");
  var passErr = document.getElementById("passErr");
  var passBtn = document.getElementById("passBtn");

  if (sessionStorage.getItem("auth") === PASS) {
    overlay.style.display = "none";
  } else {
    setTimeout(function() { passInput.focus(); }, 100);
  }

  passBtn.addEventListener("click", function() {
    if (passInput.value === PASS) {
      sessionStorage.setItem("auth", PASS);
      overlay.style.display = "none";
    } else {
      passErr.textContent = "Incorrect password — try again";
      passInput.value = "";
      passInput.focus();
    }
  });

  passInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") passBtn.click();
  });

  // ── CHANNELS ──────────────────────────────────────────────
  var defaultChannels = [
    "cortex-rakib","cortex-adstackmedia","cortex-adtechplus",
    "cortex-adviser-media","cortex-adzen","cortex-agrs",
    "cortex-atikul","cortex-atit","cortex-dxceed",
    "cortex-explorads","cortex-explorads-internal","cortex-gryffon",
    "cortex-icarus","cortex-inter-digital","cortex-intermediadm",
    "cortex-kliks","cortex-konstantinos","cortex-kueez",
    "cortex-leon","cortex-mdprojects","cortex-murtaza",
    "cortex-nexttalk","cortex-plot-labs","cortex-prashat",
    "cortex-pushx","cortex-rajib","cortex-sandip",
    "cortex-tasneem","cortex-tekchandigital","cortex-trackback-media",
    "cortex-trafficwise","cortex-xaria",
    "context-nexttalk-aharon-ran-idan","ext-cortex"
  ];

  var channels = defaultChannels.map(function(name) {
    return { name: name, selected: true };
  });

  // ── INIT ──────────────────────────────────────────────────
  window.onload = function() {
    renderChannels();
    var saved = localStorage.getItem("slackToken");
    if (saved) {
      document.getElementById("tokenInput").value = saved;
      validateToken(saved);
    }
  };

  // ── RENDER ────────────────────────────────────────────────
  function renderChannels() {
    var list = document.getElementById("channelList");
    var html = "";
    for (var i = 0; i < channels.length; i++) {
      var ch = channels[i];
      html += '<div class="channel-row ' + (ch.selected ? "selected" : "") + '" onclick="toggleChannel(' + i + ')">'
        + '<div class="channel-check">' + (ch.selected ? "✓" : "") + "</div>"
        + '<div class="channel-name"># ' + ch.name + "</div>"
        + '<button style="margin-left:auto;background:none;border:none;color:#ddd;cursor:pointer;font-size:18px" onclick="event.stopPropagation();removeChannel(' + i + ')">×</button>'
        + "</div>";
    }
    list.innerHTML = html;
  }

  function toggleChannel(i) { channels[i].selected = !channels[i].selected; renderChannels(); }
  function selectAll()  { channels.forEach(function(c) { c.selected = true;  }); renderChannels(); }
  function selectNone() { channels.forEach(function(c) { c.selected = false; }); renderChannels(); }

  function addChannel() {
    var inp  = document.getElementById("newChannel");
    var name = inp.value.trim().replace(/^#/, "");
    if (!name) return;
    if (channels.some(function(c) { return c.name === name; })) { inp.value = ""; return; }
    channels.push({ name: name, selected: true });
    inp.value = "";
    renderChannels();
  }

  function removeChannel(i) { channels.splice(i, 1); renderChannels(); }

  // ── TOKEN ─────────────────────────────────────────────────
  document.getElementById("tokenInput").addEventListener("input", function() {
    var val = this.value.trim();
    if (val.startsWith("xoxb-") && val.length > 20) {
      localStorage.setItem("slackToken", val);
      validateToken(val);
    } else {
      document.getElementById("tokenStatus").textContent = "Paste your bot token above";
      document.getElementById("tokenStatus").className = "token-status";
    }
  });

  function toggleToken() {
    var inp = document.getElementById("tokenInput");
    inp.type = inp.type === "password" ? "text" : "password";
  }

  async function validateToken(token) {
    var status = document.getElementById("tokenStatus");
    status.textContent = "Validating...";
    status.className = "token-status";
    try {
      var form = new URLSearchParams();
      form.append("token", token);
      var res  = await fetch("https://slack.com/api/auth.test", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: form.toString() });
      var data = await res.json();
      if (data.ok) {
        status.textContent = "Connected as @" + data.user + " — " + data.team;
        status.className = "token-status ok";
        document.getElementById("tokenInput").classList.add("saved");
      } else {
        status.textContent = "Invalid token — check and try again";
        status.className = "token-status err";
      }
    } catch(e) {
      status.textContent = "Could not connect to Slack";
      status.className = "token-status err";
    }
  }

  // ── FILE ──────────────────────────────────────────────────
  var attachedFile = null;

  function handleFile(file) {
    if (!file) return;
    attachedFile = file;
    var preview = document.getElementById("filePreview");
    preview.style.display = "block";
    preview.innerHTML = '<div class="file-preview">'
      + '<div class="file-icon">📄</div>'
      + '<div class="file-info"><div class="file-name">' + file.name + '</div>'
      + '<div class="file-size">' + (file.size/1024).toFixed(1) + ' KB</div></div>'
      + '<button class="remove-file" onclick="removeFile()">×</button></div>';
    document.getElementById("fileDrop").style.display = "none";
  }

  function handleDrop(e) {
    e.preventDefault();
    document.getElementById("fileDrop").classList.remove("dragover");
    handleFile(e.dataTransfer.files[0]);
  }

  function removeFile() {
    attachedFile = null;
    document.getElementById("filePreview").style.display = "none";
    document.getElementById("fileDrop").style.display = "block";
    document.getElementById("fileInput").value = "";
  }

  function updateCharCount() {
    document.getElementById("charCount").textContent = document.getElementById("messageInput").value.length;
  }

  // ── SEND ──────────────────────────────────────────────────
  async function send() {
    var token   = document.getElementById("tokenInput").value.trim();
    var message = document.getElementById("messageInput").value.trim();
    var selected = channels.filter(function(c) { return c.selected; });

    if (!token)           { alert("Please enter your Slack bot token."); return; }
    if (!message)         { alert("Please write a message."); return; }
    if (!selected.length) { alert("Please select at least one channel."); return; }

    var btn = document.getElementById("sendBtn");
    btn.disabled = true;
    btn.textContent = "Sending to " + selected.length + " channel(s)...";

    var results = document.getElementById("results");
    results.innerHTML = "";

    for (var i = 0; i < selected.length; i++) {
      var ch = selected[i];
      try {
        var form = new URLSearchParams();
        form.append("token", token);
        form.append("channel", ch.name);
        form.append("text", message);
        var res  = await fetch("https://slack.com/api/chat.postMessage", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: form.toString() });
        var data = await res.json();
        if (!data.ok) throw new Error(data.error || "Unknown error");
        addResult(results, ch.name, true, attachedFile ? "Message sent (file upload coming)" : "Message sent");
      } catch(e) {
        addResult(results, ch.name, false, e.message);
      }
    }

    btn.disabled = false;
    btn.textContent = "Send to Selected Channels";
  }

  function addResult(container, channel, success, message) {
    var div = document.createElement("div");
    div.className = "result-row " + (success ? "success" : "error");
    div.innerHTML = '<div class="result-dot"></div><b>#' + channel + '</b> — ' + message;
    container.appendChild(div);
  }
</script>
</body>
</html>
